{% extends "base.html" %}

{% block title %}
Edit Blog
{% endblock %}

{% block body %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="mb-4">Edit Blog</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Blog Title</label>
                        <input type="text"
                               name="blog_title"
                               class="form-control"
                               value="{{ blog.blog_title }}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Blog Content</label>
                        <textarea name="blog_content"
                                  rows="6"
                                  class="form-control"
                                  required>{{ blog.blog_content }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-success">
                        Update Blog
                    </button>

                    <a href="{% url 'my_blogs' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
