{% extends "base.html" %}

{% block title %}
Create Blog | My Blog
{% endblock %}

{% block body %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="mb-4">Create New Blog</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Title -->
                    <div class="form-group">
                        <label>Blog Title</label>
                        <input type="text"
                               name="blog_title"
                               class="form-control"
                               maxlength="50"
                               required>
                    </div>

                    <!-- Content -->
                    <div class="form-group">
                        <label>Blog Content</label>
                        <textarea name="blog_content"
                                  rows="6"
                                  class="form-control"
                                  required></textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-success">
                        Publish Blog
                    </button>

                    <a href="{% url 'home' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
