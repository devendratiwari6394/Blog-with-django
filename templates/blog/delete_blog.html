{% extends "base.html" %}

{% block title %}
Delete Blog
{% endblock %}

{% block body %}

<div class="card shadow-sm">
    <div class="card-body">

        <h3 class="text-danger">Delete Blog</h3>

        <p>Are you sure you want to delete:</p>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Yes, Delete
            </button>

            <a href="{% url 'my_blogs' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
        <h5 class="mt-4">{{ blog.blog_title }}</h5>

        <p class="text-muted">
            Created on {{ blog.created_at|date:"F d, Y" }}
        </p>

        <hr>

        <p class="card-text">
            {{ blog.blog_content }}
        </p>

    </div>
</div>

{% endblock %}
