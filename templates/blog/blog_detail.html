{% extends "base.html" %}

{% block title %}
{{ blog.blog_title }}
{% endblock %}

{% block body %}

<div class="card shadow-sm">
    <div class="card-body">

        <h2 class="card-title">
            {{ blog.blog_title }}
        </h2>

        <p class="text-muted">
            By {{ blog.author.first_name|default:blog.author.username }}
            on {{ blog.created_at|date:"F d, Y" }}
        </p>

        <hr>

        <p class="card-text">
            {{ blog.blog_content }}
        </p>

        <a href="{% url 'home' %}" class="btn btn-secondary mt-3">
            Back to Home
        </a>

    </div>
</div>

{% endblock %}
