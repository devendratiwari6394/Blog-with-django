{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block body %}

{% if messages %}
{% for message in messages %}
<p style="color:red;" class="text-center">{{ message }}</p>
{% endfor %}
{% endif %}

<!-- ✅ changed vh-100 → py-4 -->
<section class="py-4" style="background-color: #eee;">

    <!-- ✅ removed h-100 -->
    <div class="container">

        <!-- ✅ removed d-flex align-items-center h-100 -->
        <div class="row justify-content-center">

            <div class="col-lg-12 col-xl-11">

                <div class="card text-black shadow-sm" style="border-radius: 25px;">
                    <div class="card-body p-md-5">

                        <div class="row justify-content-center">

                            <!-- FORM COLUMN -->
                            <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                                <p class="text-center h1 fw-bold mb-4 mt-2">Sign up</p>

                                <form class="mx-1 mx-md-4" action="{% url 'registration' %}" method="POST">
                                    {% csrf_token %}

                                    <div class="mb-4">
                                        <input name="first_name" type="text" id="firstName" class="form-control">
                                        <label class="form-label" for="firstName">First Name</label>
                                    </div>

                                    <div class="mb-4">
                                        <input name="last_name" type="text" id="lastName" class="form-control">
                                        <label class="form-label" for="lastName">Last Name</label>
                                    </div>

                                    <div class="mb-4">
                                        <input name="email" type="email" id="email" class="form-control">
                                        <label class="form-label" for="email">Email</label>
                                    </div>

                                    <div class="mb-4">
                                        <input name="password" type="password" id="password" class="form-control">
                                        <label class="form-label" for="password">Password</label>
                                    </div>

                                    <div class="mb-4">
                                        <input name="re_password" type="password" id="rePassword" class="form-control">
                                        <label class="form-label" for="rePassword">Repeat your password</label>
                                    </div>

                                    <!-- ✅ Fixed checkbox -->
                                    <div class="form-check mb-4">
                                        <input class="form-check-input" type="checkbox" id="termsCheck">
                                        <label class="form-check-label ms-2" for="termsCheck">
                                            I agree all statements in
                                            <a href="#!">Terms of service</a>
                                        </label>
                                    </div>

                                    <div class="text-center">
                                        <button type="submit" class="btn btn-primary btn-lg">
                                            Register
                                        </button>
                                    </div>

                                </form>
                                <div class="text-center mt-3">
                                    <p>Already have Account?
                                        <a href="{% url 'login' %}">Login</a>
                                    </p>
                                </div>

                            </div>

                            <!-- IMAGE COLUMN (unchanged) -->
                            <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">

                                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                                    class="img-fluid" alt="Sample image">

                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</section>

{% endblock %}
